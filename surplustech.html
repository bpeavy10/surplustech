<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Surplus Tech</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #1f2937;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .main-title {
      font-size: 26px;
      font-weight: bold;
    }

    .sub-title {
      font-size: 14px;
      opacity: 0.8;
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      background: #e5e7eb;
      font-size: 14px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .specs {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

    .price {
      font-weight: bold;
      color: #10b981;
    }

    footer {
      background: #111827;
      color: white;
      text-align: center;
      padding: 20px;
    }

    footer a {
      color: #10b981;
      display: block;
    }
  </style>
</head>

<body>

<header>
  <div class="main-title">Surplus Tech</div>
  <div class="sub-title">by Synch Neighborhood 501(c)</div>
</header>

<div class="info-bar">
  <div>Last Updated: <span id="lastUpdated"></span></div>
  <div>Sold Devices: <span id="soldCount">0</span></div>
</div>

<div class="container" id="container"></div>

<footer>
  <div>Contact</div>
  <a id="emailLink"></a>
  <a id="fbLink" target="_blank"></a>
</footer>

<script>
const contact = {
  email: "youremail@example.com",
  facebook: "https://facebook.com/yourmarketplacelink"
};

document.getElementById("emailLink").href = "mailto:" + contact.email;
document.getElementById("emailLink").textContent = contact.email;

document.getElementById("fbLink").href = contact.facebook;
document.getElementById("fbLink").textContent = "View on Facebook Marketplace";

const devices = [
  { name:"MacBook Air 2015", cpu:"i5-5350U", memory:"8GB", storage:"256GB", gpu:"HD6000", os:"Ubuntu", battery:"63%", screen:"13.3\"", price:"$150", img:"testmac.jpg"},
  { name:"MacBook Air 2015", cpu:"i5-5250U", memory:"8GB", storage:"256GB", gpu:"HD6000", os:"Ubuntu", battery:"87%", screen:"13.3\"", price:"$150", img:"testmac.jpg"},
  { name:"MacBook Air 2015", cpu:"i7-5650U", memory:"8GB", storage:"121GB", gpu:"HD6000", os:"Ubuntu", battery:"94%", screen:"13.3\"", price:"$150", img:"testmac.jpg"},
  { name:"MacBook Air 2015", cpu:"i7-5650U", memory:"8GB", storage:"500GB", gpu:"HD6000", os:"Ubuntu", battery:"82%", screen:"13.3\"", price:"$150", img:"testmac.jpg"},
  { name:"MacBook Air 2017", cpu:"i7-5650U", memory:"8GB", storage:"500GB", gpu:"HD6000", os:"Ubuntu", battery:"85%", screen:"13.3\"", price:"$150", img:"testmac.jpg"},
  { name:"MacBook Air 2017", cpu:"i5-5350U", memory:"8GB", storage:"250GB", gpu:"HD6000", os:"Ubuntu", battery:"80%", screen:"13.3\"", price:"$150", img:"testmac.jpg"},
  { name:"MacBook Air 2015", cpu:"i7-5650U", memory:"8GB", storage:"500GB", gpu:"HD6000", os:"Ubuntu", battery:"96%", screen:"13.3\"", price:"$150", img:"testmac.jpg"},
  { name:"MacBook Air 2015 (6,2)", cpu:"i7-4650U", memory:"8GB", storage:"500GB", gpu:"HD6000", os:"Ubuntu", battery:"86%", screen:"13.3\"", price:"$150", img:"testmac.jpg"},
  { name:"Dell Latitude E5440", cpu:"i7-4600U", memory:"16GB", storage:"512GB", gpu:"Intel", os:"Windows 11", battery:"Excellent", screen:"14\"", price:"$1200", img:"dell.jpg"},
  { name:"HP Spectre x360", cpu:"i5", memory:"8GB", storage:"256GB", gpu:"Intel", os:"Windows 11", battery:"Good", screen:"13.3\"", price:"$950", img:"hp.jpg"}
];

document.getElementById("lastUpdated").textContent = new Date().toLocaleDateString();

const container = document.getElementById("container");

devices.forEach(d => {
  container.innerHTML += `
    <div class="card">
      <img src="${d.img || 'testmac.jpg'}" alt="${d.name}">
      <div class="card-content">
        <div class="title">${d.name}</div>
        <div class="specs">
          CPU: ${d.cpu}<br>
          Memory: ${d.memory}<br>
          Storage: ${d.storage}<br>
          GPU: ${d.gpu}<br>
          OS: ${d.os}<br>
          Battery: ${d.battery}<br>
          Screen: ${d.screen}<br>
          Condition: Certified Refurbished
        </div>
        <div class="price">${d.price}</div>
      </div>
    </div>
  `;
});
</script>

</body>
</html>
