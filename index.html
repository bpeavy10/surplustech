<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Surplus Tech</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #1f2937;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .main-title {
      font-size: 26px;
      font-weight: bold;
    }

    .sub-title {
      font-size: 14px;
      opacity: 0.8;
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      background: #e5e7eb;
      font-size: 14px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .specs {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

    .price {
      font-weight: bold;
      color: #10b981;
    }

    footer {
      background: #111827;
      color: white;
      text-align: center;
      padding: 20px;
    }

    footer a {
      color: #10b981;
      display: block;
    }
  </style>
</head>

<body>

  <div class="main-title">Surplus Tech</div>
  <div class="sub-title">by Synch Neighborhood 501(c)</div>
</header>

<div class="info-bar">

  <a id="emailLink"></a>
